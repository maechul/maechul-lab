<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매출연구소</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="is-intro-active">
  <header class="site-header" aria-label="주요 메뉴">
    <div class="site-header__inner">
      <a class="site-header__brand" href="#brand">매출연구소</a>
      <button class="site-header__toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="site-navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-header__nav" id="site-navigation" aria-label="사이트 메뉴">
        <a class="site-header__link" href="#brand" data-section="brand">매출연구소</a>
        <a class="site-header__link" href="#portfolio" data-section="portfolio">포트폴리오</a>
        <a class="site-header__link" href="#service" data-section="service">서비스</a>
        <a class="site-header__link" href="#contact" data-section="contact">문의하기</a>
      </nav>
    </div>
  </header>

  <section class="intro" aria-label="인트로 메시지">
    <div class="intro__content">
      <p class="intro__sentence intro__sentence--first">사장님의 매출을 연구합니다.</p>
      <p class="intro__sentence intro__sentence--second">매출을 만드는 숏폼을 제작합니다.</p>
    </div>
  </section>

  <main>
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__background" aria-hidden="true"></div>
      <div class="hero__overlay" aria-hidden="true"></div>
      <div class="hero__content">
        <h1 class="hero__title" id="hero-title">사장님의 매출을 연구합니다.</h1>
        <p class="hero__description">매출을 만드는 숏폼을 제작합니다.</p>
      </div>
      <button class="hero__scroll" type="button" aria-label="브랜드 섹션으로 이동">
        <span></span>
        <span></span>
      </button>
    </section>

    <section class="brand-section page-section" id="brand" aria-labelledby="brand-title">
      <div class="brand-section__inner">
        <div class="brand-section__media reveal-from-left">
          <div class="loop-video" aria-label="Loop video placeholder">
            <span>LOOP VIDEO</span>
          </div>
        </div>

        <div class="brand-section__content reveal-from-right">
          <h2 class="brand-section__title" id="brand-title">
            조회수보다 중요한 것은<br>
            매출입니다.
          </h2>
          <div class="brand-section__text">
            <p>조회수는 결과입니다.</p>
            <p>하지만 매출은 전략으로 만들어집니다.</p>
            <p>매출연구소는 단순한 영상 편집이 아니라 사장님의 매출을 연구합니다.</p>
          </div>
          <a class="brand-section__button" href="#portfolio">
            <span>제작 사례 보기</span>
            <span aria-hidden="true">→</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
