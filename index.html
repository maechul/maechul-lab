<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매출연구소</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <section class="intro" aria-label="인트로 메시지">
    <div class="intro__content">
      <p class="intro__sentence intro__sentence--first">사장님의 매출을 연구합니다.</p>
      <p class="intro__sentence intro__sentence--second">매출을 만드는 숏폼을 제작합니다.</p>
    </div>
  </section>

  <main>
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__background" aria-hidden="true"></div>
      <div class="hero__overlay" aria-hidden="true"></div>
      <div class="hero__content">
        <h1 class="hero__title" id="hero-title">사장님의 매출을 연구합니다.</h1>
        <p class="hero__description">매출을 만드는 숏폼을 제작합니다.</p>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
